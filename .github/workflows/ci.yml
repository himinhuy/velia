name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # The Phase 0 moat: engine must build, pass tests, and clear the accuracy/calibration gate.
  engine-gate:
    name: Engine — build, test & gate
    runs-on: macos-15
    defaults:
      run:
        working-directory: VeliaCore
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app || true

      - name: Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Unit + property + gate tests
        run: swift test

      - name: Phase 0 benchmark gate (exit 0 = GO)
        run: swift run velia-bench

      - name: Gate stability (alternate seed)
        run: swift run velia-bench 99

  lint:
    name: Lint & format
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: brew install swiftlint swiftformat
      - name: SwiftFormat (lint mode)
        run: swiftformat --lint .
      - name: SwiftLint (strict)
        run: swiftlint --strict

  # Generates the Tuist project, runs the module unit tests, and builds the app on a simulator.
  app-build:
    name: App — build & unit tests (iOS Simulator)
    runs-on: macos-15
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # authenticate mise's tool downloads (avoid rate limit)
    steps:
      - uses: actions/checkout@v4

      # Tuist 4.197.1's ProjectDescription is built with Swift 6.2, so the toolchain must match.
      - name: Select latest Xcode (Swift 6.2)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Install Tuist via mise
        run: |
          curl https://mise.run | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Generate Xcode project
        run: |
          mise x tuist@4.197.1 -- tuist install
          mise x tuist@4.197.1 -- tuist generate --no-open

      - name: Unit tests (VeliaFeatures, iOS Simulator)
        run: |
          xcodebuild test \
            -workspace Velia.xcworkspace \
            -scheme VeliaFeatures \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            CODE_SIGNING_ALLOWED=NO

      - name: Build app (iOS Simulator)
        run: |
          xcodebuild build \
            -workspace Velia.xcworkspace \
            -scheme Velia \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO
