# Velia SwiftLint config. See docs/engineering-practices.md §2.2.
included:
  - VeliaCore/Sources
  - VeliaCore/Tests
  - Modules        # feature/framework modules
  - App            # iOS app + UI tests

excluded:
  - "**/.build"
  - "**/Derived"
  - "**/*.generated.swift"
  # Deferred scaffolds — not in the Tuist build graph yet (Project.swift).
  - "Modules/VeliaData"
  - "Modules/VeliaSecurity"
  - "Modules/VeliaHealth"

disabled_rules:
  # SwiftFormat owns brace placement (wrapMultilineStatementBraces puts the brace on its own
  # line after a wrapped condition, which conflicts with SwiftLint's opening_brace).
  - opening_brace

opt_in_rules:
  - empty_count
  - first_where
  - contains_over_first_not_nil
  - explicit_init
  - redundant_nil_coalescing
  - closure_spacing
  - overridden_super_call
  - prohibited_super_call
  - private_action
  - private_outlet
  - vertical_whitespace_closing_braces
# Note: import sorting is owned by SwiftFormat (sorted_imports here conflicted with it).
# force_unwrapping is intentionally not enabled — under --strict it fired on tests, benchmark
# tooling and date math; force_cast/force_try (the genuinely unsafe ones) remain hard errors.

force_cast: error
force_try: error

line_length:
  warning: 160
  error: 220
  ignores_comments: true
  ignores_urls: true

type_body_length:
  warning: 300
  error: 450

file_length:
  warning: 500
  error: 800
  ignore_comment_only_lines: true

cyclomatic_complexity:
  warning: 15
  error: 25

# Math-heavy engine uses short names (z-scores, etc.); allow single-character identifiers.
# L2 is the bilingual string helper used app-wide; allow its name.
identifier_name:
  min_length: 1
  excluded: [id, x, y, a, b, n, i, w, v, q, z, df, L2]

# `L` is the localized-strings namespace.
type_name:
  excluded: [L]

# PRIVACY GUARDRAIL: flag accidental third-party analytics/network imports in the pure core.
custom_rules:
  no_banned_analytics:
    name: "Banned analytics/ad SDK"
    regex: "import (Firebase|FirebaseAnalytics|Sentry|Amplitude|Mixpanel|GoogleAnalytics|FBSDK|AppsFlyer|Adjust)"
    message: "Third-party analytics/ad SDKs violate the privacy invariant (architecture.md §0)."
    severity: error
