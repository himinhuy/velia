# Velia SwiftLint config. See docs/engineering-practices.md §2.2.
included:
  - VeliaCore/Sources
  - VeliaCore/Tests
  - Sources        # app sources, once scaffolded

excluded:
  - "**/.build"
  - "**/Derived"
  - "**/*.generated.swift"

opt_in_rules:
  - empty_count
  - force_unwrapping
  - first_where
  - contains_over_first_not_nil
  - explicit_init
  - redundant_nil_coalescing
  - closure_spacing
  - overridden_super_call
  - prohibited_super_call
  - private_action
  - private_outlet
  - sorted_imports
  - vertical_whitespace_closing_braces

# Force-unwrapping is a warning in app code (errors via --strict in CI), allowed in tests.
force_unwrapping:
  severity: warning

force_cast: error
force_try: error

line_length:
  warning: 120
  error: 160
  ignores_comments: true
  ignores_urls: true

type_body_length:
  warning: 300
  error: 450

file_length:
  warning: 500
  error: 800
  ignore_comment_only_lines: true

identifier_name:
  min_length: 2
  excluded: [id, x, y, a, b, n, i, w, v, q, df]

# PRIVACY GUARDRAIL: flag accidental third-party analytics/network imports in the pure core.
custom_rules:
  no_banned_analytics:
    name: "Banned analytics/ad SDK"
    regex: "import (Firebase|FirebaseAnalytics|Sentry|Amplitude|Mixpanel|GoogleAnalytics|FBSDK|AppsFlyer|Adjust)"
    message: "Third-party analytics/ad SDKs violate the privacy invariant (architecture.md §0)."
    severity: error
